name: Daily Commit Workflow

on:
  schedule:
    # Runs once per day at 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Git
      run: |
        git config user.name "github-actions"
        git config user.email "24f1002782@ds.study.iitm.ac.in"

    - name: 24f1002782@ds.study.iitm.ac.in Daily Commit Step
      run: |
        echo "Daily update $(date)" >> daily_log.txt
        git add daily_log.txt
        git commit -m "Daily automated commit"
        git push
